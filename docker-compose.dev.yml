services:
  hosting-mcp:
    build: .
    ports:
      - "8088:80"
    environment:
      FILES_USER: admin
      FILES_PASSWORD: changeme-dev-password
      HOSTINGMCP_MCP_KEYS: mch_mcp_live_dev_key_one,mch_mcp_live_dev_key_two
      HOSTINGMCP_PUBLIC_BASE_URL: http://localhost:8088
    volumes:
      - ./public:/var/www/public
      - hosting-mcp-fb-db:/var/lib/filebrowser

volumes:
  hosting-mcp-fb-db:
